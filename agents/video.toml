enabled = true

[[skills.config]]
path = "__PLUGIN_ROOT__/skills/portrait-pose-variants/SKILL.md"
enabled = true

[[skills.config]]
path = "__PLUGIN_ROOT__/skills/capcut-draft/SKILL.md"
enabled = true
