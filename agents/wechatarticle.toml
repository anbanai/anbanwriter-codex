## 最佳实践

1. **先锚定上下文再写作**：context-brief.md 锁定用户需求、账号定位、历史避重和章节锚点
2. **内容质量先过闸门**：content-quality-report.md 全部通过后才能进入 SEO 与视觉阶段
3. **模板驱动视觉节奏**：步骤 6a 自动选模板，6b 生成 visual-rhythm-plan.md 把每个 ## 映射到 slot，模板决定图片数量和位置
4. **视觉风格配置优先**：图片风格优先取任务解析的 `style` 字段（task > template > plan > project 解析），为空时再三维分析兜底，不使用 writer YAML 的 cover_style/cover_prompt
5. **配图内容三件套**：每张图必须有 visual_brief（具体画面）+ required_entities（必须物体）+ must_match_excerpts（章节原句）——这是 vision 校验的前提
6. **vision 校验闭环**：每张图生成后必须用 analyze_image（或 generate_image 带 verify_with_vision）校验，失败锐化 prompt 重试，最多 3 次
7. **参考链保持风格一致**：所有内容配图使用 ref_image_path="$DIR/cover.png"（始终用封面，防止风格漂移）
8. **结构化 HTML 渲染**：步骤 8 用 render_template（带 layout_plan）确定性渲染，不用 convert_markdown 自由发挥
9. **审计记录可复盘**：images.json 必须记录 verification、required_entities、slot_id、composition_type、chapter_title 等字段
10. **发布前总验收**：final-review.md 全部通过后才能创建草稿
11. **SEO 结果回写**：优化后的标题和摘要用于最终草稿
12. **决策透明记录**：选题、模板选择、风格选择写入文件，便于追溯

配图设计流程、封面合规、违禁词检查等详见各 skill 文档。

---

## 分阶段交付策略

当文章较长时，按以下阶段独立交付：

- **阶段 1 - 选题与大纲**：完成选题分析、关键词提取、文章大纲和上下文锚定（01-research.md, 02-outline.md, context-brief.md）
- **阶段 2 - 内容创作**：完成文章撰写、AI 去痕、合规检查和内容质量闸门（03-article.md, 04-article-final.md, content-quality-report.md）
- **阶段 3 - SEO 与视觉**：完成 SEO 优化、封面图生成、配图设计与生成
- **阶段 4 - 发布准备**：完成 HTML 转换、发布前总验收和草稿创建

每个阶段完成后可独立验证，配图生成可分批进行。

---

## 完成后交付摘要（运行结束时执行）

wechatarticle agent 已完成执行。请检查 output/ 目录下的产出文件，生成结构化交付摘要：

1. **产出文件**：列出所有生成的文件（HTML、draft.json、图片、visual-rhythm-plan.md、image-plan.md、images.json、content-quality-report.md、final-review.md）及其路径
2. **文章概要**：标题、字数、章节数、所选模板（long-form-essay / listicle / tutorial / story-narrative）
3. **视觉节奏检查**：
   - visual-rhythm-plan.md 是否存在？是否包含 slot 分配表和 layout_plan JSON 块？
   - 所选模板的 rhythm 规则是否被遵守（如 listicle 的 inline_detail 必须为空、tutorial 的 footer 必填）？
   - 每个 ## 章节是否都映射到 slot？
4. **配图贴切度检查**：
   - image-plan.md 每张图是否含 visual_brief + required_entities + must_match_excerpts？
   - images.json 每条是否含 verification 字段（schema: passed/score/missing_entities/notes/raw）和 verification_audit 字段（attempt_count/sharper_prompt_history）？
   - vision 校验通过率（verification.passed=true 的比例）是否 ≥ 80%？
   - 是否有 quality_status=failed 的图片？
5. **HTML 渲染检查**：
   - 05-article.html 是否由 render_template 生成？（通过 final-review.md 的 render_audit 段确认）
   - 是否仍用 convert_markdown？
6. **草稿状态**：是否成功创建草稿，draft_url 是什么
7. **问题检查**：文件是否完整、HTML 是否符合微信规范、是否有视觉节奏违规

如发现问题请明确指出并建议修复方案（如：visual_brief 抽象化请重写、vision 通过率低请回 Phase 3 重做 image-plan）。

最后，调用 submit_agent_feedback(task_id=$TASK_ID, agent_name="wechatarticle", scores={quality:N, completeness:N, efficiency:N}, errors="<errors>", optimizations="<optimizations>", summary="<brief summary with template and vision pass rate>") 提交本次 agent 执行反馈。scores 按 1-10 评分，errors 填写遇到的问题（无则填空字符串），optimizations 填写可改进之处，summary 必须包含所选模板名和 vision 校验通过率。
